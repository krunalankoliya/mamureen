name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1 — CI: runs on every push and every Pull Request
  # ──────────────────────────────────────────────────────────────
  ci:
    name: PHP Lint & Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: none
          coverage: none

      # Check every tracked PHP file for syntax errors
      - name: PHP syntax check
        run: |
          echo "Checking PHP syntax on all tracked .php files..."
          ERRORS=0
          while IFS= read -r file; do
            if ! php -l "$file" > /dev/null 2>&1; then
              echo "SYNTAX ERROR: $file"
              php -l "$file"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(git ls-files '*.php')
          if [ "$ERRORS" -gt 0 ]; then
            echo "❌ $ERRORS PHP syntax error(s) found. Fix before merging."
            exit 1
          fi
          echo "✅ All PHP files passed syntax check."

      # Block any raw mumin_images URL leaking into tracked files
      # img.php is the only allowed file (it IS the proxy)
      - name: Security scan — raw mumin_images URLs
        run: |
          echo "Scanning for exposed mumin_images URLs..."
          MATCHES=$(git ls-files '*.php' '*.js' | \
            xargs grep -l "talabulilm\.com/mumin_images" 2>/dev/null | \
            grep -v "^img\.php$" || true)
          if [ -n "$MATCHES" ]; then
            echo "❌ SECURITY FAIL: Raw mumin_images URLs found in:"
            echo "$MATCHES"
            echo ""
            echo "Use the proxy instead: img.php?id=<its_id>"
            exit 1
          fi
          echo "✅ No raw mumin_images URLs found."

  # ──────────────────────────────────────────────────────────────
  # JOB 2 — DEPLOY: only after CI passes, only on push to main
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to cPanel
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.CPANEL_SSH_HOST }}
          username: ${{ secrets.CPANEL_SSH_USER }}
          key:      ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}
          port:     ${{ secrets.CPANEL_SSH_PORT }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "▶ Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "▶ Writing conn.php from secrets..."
            cat > conn.php << 'PHPEOF'
<?php
$host     = '${{ secrets.DB_HOST }}';
$db       = '${{ secrets.DB_NAME }}';
$user     = '${{ secrets.DB_USER }}';
$password = '${{ secrets.DB_PASSWORD }}';

$mysqli = mysqli_connect($host, $user, $password, $db);
if ($mysqli === false) { die("ERROR: Could not connect. " . mysqli_connect_error()); }
$mysqli->set_charset("utf8");

$corehost     = '${{ secrets.CORE_DB_HOST }}';
$coredb       = '${{ secrets.CORE_DB_NAME }}';
$coreuser     = '${{ secrets.CORE_DB_USER }}';
$corepassword = '${{ secrets.CORE_DB_PASSWORD }}';

$coremysqli = mysqli_connect($corehost, $coreuser, $corepassword, $coredb);
if ($coremysqli === false) { die("ERROR: Could not connect. " . mysqli_connect_error()); }
$coremysqli->set_charset("utf8");

define('ITS_KEY',              '${{ secrets.ITS_KEY }}');
define('COOKIE_SECRET',        '${{ secrets.COOKIE_SECRET }}');
define('COOKIE_SECRET_LEGACY', '${{ secrets.COOKIE_SECRET_LEGACY }}');

function user_photo_url($its_id) {
    return MODULE_PATH . 'img.php?id=' . (int) $its_id;
}

define('USER_LOGGED_IN',  'user_logged_in');
define('USER_ID',         'user_id');
define('USER_ITS',        'user_its');
define('GROUP_ID',        'group_id');
define('ENABLE_WRITE_LOG', FALSE);
define('MARHALA_ID',      'marhala_id');
define('IS_ADMIN',        'is_admin');
define('USER_ROLE',       'user_role');
define('TANZEEM_ID',      'tanzeem_id');
define('USER_TYPE',       'user_type');
define('JAMAT_NAME',      'jamat_name');
define('EDU_HUB',         'edu_hub');
define('IS_EDU_HUB',      'is_edu_hub');
define('SUCCESS_MESSAGE', 'success_message');
define('ERROR_MESSAGE',   'error_message');
define('MODULE_PATH',     'https://www.talabulilm.com/mamureen/');
PHPEOF

            echo "▶ Writing smtp_config.php from secrets..."
            cat > inc/smtp_config.php << 'SMTPEOF'
<?php
define('SUPPORT_SMTP_HOST',     '${{ secrets.SMTP_HOST }}');
define('SUPPORT_SMTP_PORT',     ${{ secrets.SMTP_PORT }});
define('SUPPORT_SMTP_USER',     '${{ secrets.SMTP_USER }}');
define('SUPPORT_SMTP_PASSWORD', '${{ secrets.SMTP_PASSWORD }}');
define('SUPPORT_FROM_NAME',     'Mamureen Support');
SMTPEOF

            echo "✅ Deployed at $(date '+%Y-%m-%d %H:%M:%S')"
